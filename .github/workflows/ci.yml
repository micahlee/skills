name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate skills
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check shell scripts parse
        run: bash -n scripts/*.sh

      - name: Validate skills
        run: bash scripts/validate-skills.sh

